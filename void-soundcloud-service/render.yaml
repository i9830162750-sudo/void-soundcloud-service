# render.yaml
# VOID SoundCloud Service — Render deployment

services:
  - type: web
    name: void-soundcloud
    runtime: node
    plan: free
    region: oregon

    buildCommand: npm install --omit=dev

    startCommand: node server.js

    healthCheckPath: /health

    autoDeploy: true

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      # Add this in Render dashboard → Environment tab:
      # SOUNDCLOUD_CLIENT_ID    your SoundCloud client_id
